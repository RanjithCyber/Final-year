<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white min-h-screen"
  >
    <!-- HEADER -->
    <header
      class="p-6 shadow-lg bg-black/40 backdrop-blur-md border-b border-gray-700"
    >
      <h1 class="text-3xl font-bold tracking-wide text-green-400 animate-pulse">
        🔐 Security Monitoring Dashboard
      </h1>
    </header>

    <div class="p-8">
      <!-- STAT CARDS -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- Total Attacks -->
        <div
          class="bg-black/40 backdrop-blur-md p-6 rounded-2xl shadow-xl hover:scale-105 transition duration-300 border border-green-400/20"
        >
          <h2 class="text-gray-400 text-sm uppercase tracking-wider">
            Total Attacks
          </h2>
          <p id="totalAttacks" class="text-4xl font-bold text-red-500 mt-2">
            0
          </p>
        </div>

        <!-- Latest IP -->
        <div
          class="bg-black/40 backdrop-blur-md p-6 rounded-2xl shadow-xl hover:scale-105 transition duration-300 border border-yellow-400/20"
        >
          <h2 class="text-gray-400 text-sm uppercase tracking-wider">
            Latest IP
          </h2>
          <p id="latestIP" class="text-2xl font-semibold text-yellow-400 mt-2">
            --
          </p>
        </div>

        <!-- Last Attack Time -->
        <div
          class="bg-black/40 backdrop-blur-md p-6 rounded-2xl shadow-xl hover:scale-105 transition duration-300 border border-red-400/20"
        >
          <h2 class="text-gray-400 text-sm uppercase tracking-wider">
            Last Attack
          </h2>
          <p id="latestTime" class="text-lg text-red-400 mt-2">--</p>
        </div>
      </div>

      <!-- ATTACK TABLE -->
      <div
        class="bg-black/40 backdrop-blur-md p-6 rounded-2xl shadow-2xl mb-8 border border-gray-700"
      >
        <h2 class="text-xl font-semibold text-green-400 mb-4">
          📊 Intrusion Logs
        </h2>

        <div class="overflow-x-auto">
          <table class="min-w-full text-sm text-left">
            <thead>
              <tr>
                <th>Username</th>
                <th>Password</th>
                <th>IP</th>
                <th>Country</th>
                <th>City</th>
                <th>ISP</th>
                <th>Time</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="logTable" class="divide-y divide-gray-700"></tbody>
          </table>
        </div>
      </div>

      <!-- GRAPH -->
      <div
        class="bg-black/40 backdrop-blur-md p-6 rounded-2xl shadow-2xl border border-gray-700"
      >
        <h2 class="text-xl font-semibold text-green-400 mb-4">
          📈 Attack Activity
        </h2>
        <canvas id="attackChart"></canvas>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hacker Profile</title>

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        min-height: 100vh;
        padding: 40px;
      }

      /* HEADER */

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 32px;
        font-weight: 600;
      }

      .header i {
        color: #5ec576;
        font-size: 26px;
      }

      /* CARD */

      .card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(15px);

        animation: fadeUp 0.7s ease;
      }

      /* TABLE */

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: rgba(255, 255, 255, 0.08);
      }

      th {
        text-align: left;
        padding: 16px;
        font-size: 14px;
        color: #9ca3af;
        text-transform: uppercase;
      }

      td {
        padding: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 15px;
      }

      /* HOVER */

      tr:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: scale(1.01);
        transition: all 0.2s ease;
      }

      /* BADGES */

      .badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .badge-page {
        background: #1e40af;
      }

      .badge-mouse {
        background: #0f766e;
      }

      .badge-key {
        background: #9333ea;
      }

      /* ANIMATION */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="header">
      <i class="fa-solid fa-user-secret"></i>
      <h1>Hacker Profile</h1>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Action</th>
            <th>Details</th>
            <th>Time</th>
          </tr>
        </thead>

        <tbody id="actions"></tbody>
      </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="hacker.js"></script>
  </body>
</html>

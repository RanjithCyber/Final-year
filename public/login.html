<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOB Secure Access</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Inter", system-ui, sans-serif;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #0f0f10, #2a2a2c);
      }

      .login-card {
        width: 360px;
        padding: 34px 30px;
        background: linear-gradient(180deg, #d6b97c, #c7a85f);
        border-radius: 10px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .bank-name {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        color: #1c1917;
        margin-bottom: 4px;
      }

      .tagline {
        text-align: center;
        font-size: 13px;
        color: #3f3a2e;
        margin-bottom: 28px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #2b251a;
      }

      input {
        width: 100%;
        padding: 11px 12px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.25);
        background: rgba(255, 255, 255, 0.85);
        color: #1c1917;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: #3b2f12;
        box-shadow: 0 0 0 2px rgba(59, 47, 18, 0.25);
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 11px;
        border-radius: 6px;
        border: none;
        background: #1c1917;
        color: #f5f5f4;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
      }

      button:hover {
        background: #111827;
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      #message {
        margin-top: 14px;
        font-size: 13px;
        text-align: center;
        color: #7f1d1d;
      }

      .footer-note {
        margin-top: 22px;
        font-size: 11px;
        text-align: center;
        color: #3f3a2e;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <div class="bank-name">Indian Overseas Bank</div>
      <div class="tagline">Authorized Secure Access</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">User ID</label>
          <input type="text" id="username" required />
        </div>

        <div class="form-group">
          <label for="password">PIN</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div id="message"></div>

      <div class="footer-note">Confidential • Internal Use Only</div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await response.json();
          document.getElementById("message").innerText = data.message;

          if (data.redirect) {
            window.location.href = data.redirect;
          }
        });
    </script>
  </body>
</html>
